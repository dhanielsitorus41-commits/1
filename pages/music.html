<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Our Song ❤️</title>

<link rel="stylesheet"
href="../style.css">

</head>

<body>

<div class="hearts-container"></div>

<div class="navbar">

<a href="dashboard.html">🏠 Home</a>

<a href="gallery.html">🖼 Gallery</a>

<a href="letter.html">💌 Letter</a>

</div>

<div class="overlay">

<div class="music-container">

<img
src="../assets/profil musik.jpg"
class="album-cover">

<h1>🎵 Penjaga Hati</h1>

<h2>Until I Found You ❤️</h2>

<p>
Lagu yang selalu mengingatkanku padamu
</p>

<audio id="music">

<source
src="../assets/Nadhif Basalamah .mp3"
type="audio/mpeg">

</audio>

<button id="playBtn">

▶ Play Music

</button>

</div>

</div>

<script>

const music =
document.getElementById(
"music"
);

const btn =
document.getElementById(
"playBtn"
);

btn.addEventListener(
"click",
()=>{

if(music.paused){

music.play();

btn.innerHTML =
"⏸ Pause Music";

}else{

music.pause();

btn.innerHTML =
"▶ Play Music";

}

});

</script>

<script src="../script.js"></script>

</body>
</html>
